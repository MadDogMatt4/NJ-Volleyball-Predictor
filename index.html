<script>
/* ===========================================================================
   NJ GIRLS VOLLEYBALL PLAYOFF PREDICTOR
   Shared multi-sport Supabase project. This build is SPORT = 'volleyball_g'.
   To make another sport: change SPORT, SPORT_NAME, and the CONFIG values below.
   =========================================================================== */

const SPORT       = 'volleyball_g';
const SPORT_NAME  = 'Girls Volleyball';

// NJSIAA PowerPoint numbers for this sport.
// These are DEFAULTS — the app overwrites them from the `sports` table at load,
// and admins can edit them in-app (Settings panel on the Teams tab). That means
// next year's cutoff is a form field, not a code change.
let CONFIG = {
  BEST_N:      16,             // best N per-game PowerPoint values are averaged
  FIRST_N:     16,             // residual + OOWP use opponents' FIRST N games
  MIN_GAMES:   16,             // if a team played fewer, divide by this anyway
  TIES_ALLOWED: false,         // volleyball has no ties — every match has a winner
  CUTOFF_DATE: '2026-10-24',   // games on/before this date count
  MEMBER_PCT_REQUIRED: 0.60    // >= 60% of games must be vs NJSIAA members
};

// Girls volleyball qualifies a DIFFERENT number of teams depending on the group:
//   Group 1        -> 24 per section
//   Groups 2, 3, 4 -> 20 per section
//   Non-Publics    -> 16 per section
// NOTE: 2026 is the first year the NJSIAA is using these expanded fields, so this
// (and the bye structure below) is our best reading of the new format and may need
// adjusting once the actual brackets are published.
const BRACKET_SIZE_BY_GROUP = { '1':24, '2':20, '3':20, '4':20, 'NPA':16, 'NPB':16 };
function bracketSizeFor(group){
  return BRACKET_SIZE_BY_GROUP[group] !== undefined ? BRACKET_SIZE_BY_GROUP[group] : 16;
}

// Section structure for girls volleyball: publics 1-4 across four sections;
// non-publics A/B across two sections.
const PUBLIC_GROUPS   = ['1','2','3','4'];
const PUBLIC_SECTIONS = ['North','South'];   // volleyball: TWO sections
const NP_GROUPS       = ['NPA','NPB'];
const NP_SECTIONS     = ['North','South'];

const SUPABASE_URL = 'https://bqrhqgezgdwhkwnplywl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_P3OOa1BXM5XeMqLo7TDfPQ_XlSrwjbL';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ----------------------------- state ----------------------------------- */
let state = { teams: [], games: [] };
let predictions = {};          // gameId -> teamId | 'TIE'
let coinFlips = {};            // key -> teamId
let isAdmin = false;
let currentUser = null;
let siteMessage = '';
let maintenanceOn = false;
let maintenanceMessage = '';
let activeTab = 'rankings';
let detailTeamId = null;

// filters
let rankSection = null;
let bracketSection = null;
let gamesFilterSection = 'all';
let gamesFilterElig = 'all';
let predictFilterSection = 'all';
let teamsSortBy = 'section';

/* ----------------------------- utilities -------------------------------- */
function uid(p){ return p + Math.random().toString(36).slice(2,9); }
function escapeHtml(s){
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(()=>{ el.style.display='none'; }, 3200);
}
function fmtPP(n){ return (Math.round(n*1000)/1000).toFixed(3); }

// Section key + label helpers. Publics use the 4-section model, non-publics the 2-section.
function sectionKey(section, group){ return section + '|' + group; }
function sectionLabel(section, group){
  if (NP_GROUPS.includes(group)){
    const g = group === 'NPA' ? 'Non-Public A' : 'Non-Public B';
    return section + ' ' + g;
  }
  return section + ' Group ' + group;
}
// Every section this sport has (used for dropdowns and bracket building).
function getAllSections(){
  const out = [];
  PUBLIC_GROUPS.forEach(g => PUBLIC_SECTIONS.forEach(s =>
    out.push({ section:s, group:g, key:sectionKey(s,g), label:sectionLabel(s,g) })));
  NP_GROUPS.forEach(g => NP_SECTIONS.forEach(s =>
    out.push({ section:s, group:g, key:sectionKey(s,g), label:sectionLabel(s,g) })));
  return out;
}

/* --------------------------- db mapping --------------------------------- */
function dbTeamToLocal(r){
  return {
    id:r.id, name:r.name, section:r.section, group:r.team_group,
    ineligible:!!r.ineligible, isOutOfState:!!r.is_out_of_state,
    njsiaaMember: r.njsiaa_member === false ? false : true,
    manualRecord: r.manual_record || {w:0,t:0,l:0},
    conference:r.conference||null, division:r.division||null
  };
}
function localTeamToDb(t){
  return {
    sport:SPORT, id:t.id, name:t.name, section:t.section, team_group:t.group,
    ineligible:!!t.ineligible, is_out_of_state:!!t.isOutOfState,
    njsiaa_member: t.njsiaaMember !== false,
    manual_record:t.manualRecord,
    conference:t.conference||null, division:t.division||null
  };
}
function dbGameToLocal(r){
  return { id:r.id, date:r.game_date, teamA:r.team_a, teamB:r.team_b, scoreA:r.score_a, scoreB:r.score_b };
}
function localGameToDb(g){
  return { sport:SPORT, id:g.id, game_date:g.date, team_a:g.teamA, team_b:g.teamB,
           score_a:g.scoreA, score_b:g.scoreB };
}

/* ---------------------- pagination (1000-row cap) ----------------------- */
async function fetchAllRows(table, select){
  const PAGE = 1000;
  let from = 0, all = [];
  while (true){
    const { data, error } = await sb.from(table).select(select)
      .eq('sport', SPORT).range(from, from + PAGE - 1);
    if (error){ console.error('fetch '+table, error); break; }
    all = all.concat(data);
    if (!data || data.length < PAGE) break;
    from += PAGE;
  }
  return all;
}
async function writeInChunks(table, rows){
  const CHUNK = 500;
  for (let i=0;i<rows.length;i+=CHUNK){
    const { error } = await sb.from(table).upsert(rows.slice(i,i+CHUNK));
    if (error){ console.error('write '+table, error); return error; }
  }
  return null;
}

/* ------------------------------ auth ------------------------------------ */
async function initAuth(){
  const { data:{ session } } = await sb.auth.getSession();
  if (session){
    currentUser = session.user;
    const { data } = await sb.from('admins').select('email').eq('email', session.user.email).maybeSingle();
    isAdmin = !!data;
  } else {
    const { data, error } = await sb.auth.signInAnonymously();
    if (!error && data && data.user) currentUser = data.user;
    isAdmin = false;
  }
}
async function adminLogin(){
  const email = document.getElementById('adminEmail').value.trim();
  const pass  = document.getElementById('adminPass').value;
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error){ showToast('Login failed.'); return; }
  location.reload();
}
async function adminLogout(){ await sb.auth.signOut(); location.reload(); }

/* --------------------------- load everything ---------------------------- */
async function loadAllData(){
  const [teamRows, gameRows, predRows, flipRows, msgRes, sportRes] = await Promise.all([
    fetchAllRows('teams', 'id,name,section,team_group,ineligible,is_out_of_state,njsiaa_member,manual_record,conference,division'),
    fetchAllRows('games', 'id,game_date,team_a,team_b,score_a,score_b'),
    currentUser
      ? sb.from('predictions').select('game_id,winning_team_id').eq('sport',SPORT).eq('user_id',currentUser.id)
      : Promise.resolve({ data: [] }),
    sb.from('coin_flips').select('key,winning_team_id').eq('sport',SPORT),
    sb.from('site_message').select('message,maintenance_on,maintenance_message').eq('sport',SPORT).maybeSingle(),
    sb.from('sports').select('best_n,first_n,min_games,ties_allowed,cutoff_date').eq('sport',SPORT).maybeSingle()
  ]);

  // Sport settings come from the DB; anything null keeps its built-in default.
  const s = sportRes && sportRes.data;
  if (s){
    if (s.best_n       != null) CONFIG.BEST_N       = s.best_n;
    if (s.first_n      != null) CONFIG.FIRST_N      = s.first_n;
    if (s.min_games    != null) CONFIG.MIN_GAMES    = s.min_games;
    if (s.ties_allowed != null) CONFIG.TIES_ALLOWED = s.ties_allowed;
    if (s.cutoff_date  != null) CONFIG.CUTOFF_DATE  = s.cutoff_date;
  }

  state.teams = teamRows.map(dbTeamToLocal);
  state.games = gameRows.map(dbGameToLocal);

  predictions = {};
  ((predRows && predRows.data) || []).forEach(r => { predictions[r.game_id] = r.winning_team_id; });

  coinFlips = {};
  ((flipRows && flipRows.data) || []).forEach(r => { coinFlips[r.key] = r.winning_team_id; });

  const m = msgRes && msgRes.data;
  siteMessage        = (m && m.message) || '';
  maintenanceOn      = !!(m && m.maintenance_on);
  maintenanceMessage = (m && m.maintenance_message) || '';
}
/* ===========================================================================
   POWERPOINT ENGINE
     gamePP = (Quality + Residual) x OOWP
     teamPP = avg(best BEST_N)          if gamesPlayed >= MIN_GAMES
            = sum(all) / MIN_GAMES      if gamesPlayed <  MIN_GAMES
   Verified against the NJSIAA spec (see SOCCER_SPEC.md).
   =========================================================================== */

// Predictions overlay: a game with no real score uses the user's pick.
// A predicted win = 1-0; a predicted tie = 1-1. (Only the RESULT matters to
// this formula — margins are never used — so these placeholder scores are safe.)
function effectiveGames(){
  return state.games.map(g => {
    const hasScore = g.scoreA !== null && g.scoreA !== undefined &&
                     g.scoreB !== null && g.scoreB !== undefined;
    if (hasScore) return g;
    const pick = predictions[g.id];
    if (!pick) return null;                       // unpredicted + unplayed = ignored
    if (pick === 'TIE') return { ...g, scoreA:1, scoreB:1, isProjected:true };
    const aWins = pick === g.teamA;
    return { ...g, scoreA: aWins?1:0, scoreB: aWins?0:1, isProjected:true };
  }).filter(Boolean);
}
function hasAnyProjected(){ return effectiveGames().some(g => g.isProjected); }

function winPct(w,t,l){ const n=w+t+l; return n>0 ? w/n : 0; }

// All of a team's games on/before the cutoff, ordered by date (earliest first).
function teamGamesInOrder(teamId, games){
  const out = [];
  games.forEach(g => {
    if (g.date > CONFIG.CUTOFF_DATE) return;         // after the cutoff: excluded
    let oppId, sSelf, sOpp;
    if (g.teamA === teamId){ oppId=g.teamB; sSelf=g.scoreA; sOpp=g.scoreB; }
    else if (g.teamB === teamId){ oppId=g.teamA; sSelf=g.scoreB; sOpp=g.scoreA; }
    else return;
    const result = sSelf > sOpp ? 'W' : (sSelf === sOpp ? 'T' : 'L');
    out.push({ gameId:g.id, oppId, result, date:g.date, isProjected:!!g.isProjected });
  });
  out.sort((a,b)=> a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  return out;
}

// A team's record in their FIRST N games (what residual + OOWP win% are based on).
// Out-of-state teams: use the admin-entered manual record (their schedule is unknowable).
function firstNRecord(teamId, games){
  const team = state.teams.find(t=>t.id===teamId);
  if (!team) return { w:0,t:0,l:0, games:[] };
  if (team.isOutOfState){
    const mr = team.manualRecord || {w:0,t:0,l:0};
    return { w:mr.w||0, t:mr.t||0, l:mr.l||0, games:[], isOOS:true };
  }
  const ordered = teamGamesInOrder(teamId, games).slice(0, CONFIG.FIRST_N);
  let w=0,t=0,l=0;
  ordered.forEach(g=>{ if(g.result==='W')w++; else if(g.result==='T')t++; else l++; });
  return { w,t,l, games:ordered, isOOS:false };
}

// OOWP for a game against opponent X = avg win% of the teams X PLAYED, + 0.500.
// (Reading A of the NJSIAA text: "your opponent's opponents".)
// OOS teams contribute .500 inside the average, and an OOS opponent yields exactly 1.000.
function computeOOWPFor(oppId, firstNCache){
  const opp = state.teams.find(t=>t.id===oppId);
  if (!opp) return 1.0;
  if (opp.isOutOfState) return 0.5 + 0.5;          // schedule unknowable -> neutral

  const theirOpps = (firstNCache[oppId] && firstNCache[oppId].games || []).map(g=>g.oppId);
  if (!theirOpps.length) return 0.5 + 0.5;

  let sum = 0;
  theirOpps.forEach(oid => {
    const o = state.teams.find(t=>t.id===oid);
    if (o && o.isOutOfState){ sum += 0.5; return; }
    const rec = firstNCache[oid];
    sum += rec ? winPct(rec.w, rec.t, rec.l) : 0.5;
  });
  return (sum / theirOpps.length) + 0.5;
}

function qualityPoints(result){
  if (result==='W') return 6;
  if (result==='T') return CONFIG.TIES_ALLOWED ? 3 : 0;
  return 0;
}
function residualPoints(result, oppRec){
  const oppW = oppRec.w;
  if (result==='W') return 3 * oppW;
  if (result==='L') return 1 * oppW - 1;                 // the -1 always applies
  // TIE: exclude THIS game from the opponent's tie count
  const oppT = Math.max(0, oppRec.t - 1);
  return 1.5 * oppW + 0.75 * oppT;
}

/* --------------- 60% NJSIAA-member eligibility rule --------------------- */
// A team is eligible only if >= 60% of its games through the cutoff were vs
// NJSIAA MEMBER teams. Auto-computed; the admin's `ineligible` flag overrides.
function memberEligibility(teamId, games){
  const gl = teamGamesInOrder(teamId, games);
  if (!gl.length) return { pct:null, eligible:true, memberGames:0, total:0, reason:null };
  let member = 0;
  gl.forEach(g => {
    const opp = state.teams.find(t=>t.id===g.oppId);
    if (opp && opp.njsiaaMember !== false && !opp.isOutOfState) member++;
  });
  const pct = member / gl.length;
  const eligible = pct >= CONFIG.MEMBER_PCT_REQUIRED;
  return {
    pct, eligible, memberGames:member, total:gl.length,
    reason: eligible ? null : `ineligible: ${(pct*100).toFixed(0)}% NJSIAA-member games (needs 60%)`
  };
}
// Final eligibility = passes the 60% rule AND not manually flagged by the admin.
function isEligible(team, games){
  if (team.isOutOfState) return false;
  if (team.ineligible) return false;                 // admin override
  return memberEligibility(team.id, games).eligible;
}

/* ------------------------- the main computation -------------------------- */
function computeAll(){
  const games = effectiveGames();

  // Cache each team's first-N record once (used by residual AND OOWP).
  const firstNCache = {};
  state.teams.forEach(t => { firstNCache[t.id] = firstNRecord(t.id, games); });

  // Cache OOWP per opponent (identical for every game against that opponent).
  const oowpCache = {};
  state.teams.forEach(t => { oowpCache[t.id] = computeOOWPFor(t.id, firstNCache); });

  const data = {};
  state.teams.forEach(team => {
    if (team.isOutOfState) return;                   // OOS teams are not ranked

    const gl = teamGamesInOrder(team.id, games).map(g => {
      const oppRec = firstNCache[g.oppId] || {w:0,t:0,l:0};
      const q = qualityPoints(g.result);
      const r = residualPoints(g.result, oppRec);
      const oowp = oowpCache[g.oppId] !== undefined ? oowpCache[g.oppId] : 1.0;
      return { ...g, quality:q, residual:r, oowp, pp:(q+r)*oowp };
    });

    const played = gl.length;
    let finalPP, usedGames;
    if (played >= CONFIG.MIN_GAMES){
      usedGames = [...gl].sort((a,b)=>b.pp-a.pp).slice(0, CONFIG.BEST_N);
      finalPP = usedGames.reduce((s,g)=>s+g.pp,0) / usedGames.length;
    } else {
      usedGames = gl;
      finalPP = gl.reduce((s,g)=>s+g.pp,0) / CONFIG.MIN_GAMES;   // short schedule penalty
    }

    let w=0,t=0,l=0;
    gl.forEach(g=>{ if(g.result==='W')w++; else if(g.result==='T')t++; else l++; });

    const usedIds = new Set(usedGames.map(g=>g.gameId));
    const elig = memberEligibility(team.id, games);

    data[team.id] = {
      powerPoints: Math.round(finalPP*1000)/1000,
      gamesPlayed: played,
      belowMinimum: played < CONFIG.MIN_GAMES,
      record: { w, t, l },
      winPct: winPct(w,t,l),
      gameLog: gl,
      usedGameIds: usedIds,
      avgQuality:  played ? gl.reduce((s,g)=>s+g.quality,0)/played : 0,
      avgResidual: played ? gl.reduce((s,g)=>s+g.residual,0)/played : 0,
      avgOOWP:     played ? gl.reduce((s,g)=>s+g.oowp,0)/played : 0,
      eligibility: elig,
      eligible: isEligible(team, games)
    };
  });
  return data;
}

/* --------------------------- tiebreakers --------------------------------- */
// Order: head-to-head (2-way ONLY) -> avg quality -> avg residual -> avg OOWP
//        -> common-opponent win% -> total win% -> coin toss
function headToHead(aId, bId, games){
  let aw=0,bw=0;
  teamGamesInOrder(aId, games).forEach(g => {
    if (g.oppId !== bId) return;
    if (g.result==='W') aw++; else if (g.result==='L') bw++;
  });
  if (aw > bw) return -1;
  if (bw > aw) return 1;
  return 0;
}
function commonOpponentPct(teamId, otherId, games){
  const mine   = teamGamesInOrder(teamId, games);
  const theirs = new Set(teamGamesInOrder(otherId, games).map(g=>g.oppId));
  const common = mine.filter(g => theirs.has(g.oppId));
  if (!common.length) return null;
  let w=0,t=0,l=0;
  common.forEach(g=>{ if(g.result==='W')w++; else if(g.result==='T')t++; else l++; });
  return winPct(w,t,l);
}
function coinFlipKey(ids){ return 'cf:' + [...ids].sort().join(','); }

// Sorts a section's teams by PowerPoints, applying the full tiebreaker chain.
// Returns [{ team, data, tiebreakNote }]
function rankTeams(teams, data, games){
  const groups = {};
  teams.forEach(t => {
    const k = data[t.id].powerPoints.toFixed(3);
    (groups[k] = groups[k] || []).push(t);
  });

  const ordered = [];
  Object.keys(groups).sort((a,b)=>Number(b)-Number(a)).forEach(k => {
    const grp = groups[k];
    if (grp.length === 1){ ordered.push({ team:grp[0], note:null }); return; }

    // 1. Head-to-head — ONLY for exactly two tied teams.
    if (grp.length === 2){
      const h = headToHead(grp[0].id, grp[1].id, games);
      if (h !== 0){
        const sorted = h < 0 ? [grp[0],grp[1]] : [grp[1],grp[0]];
        sorted.forEach(t => ordered.push({ team:t, note:'head-to-head' }));
        return;
      }
    }

    // 2-6. Metric chain, each higher-is-better.
    const chain = [
      { name:'avg quality points',   get:t=>data[t.id].avgQuality },
      { name:'avg residual points',  get:t=>data[t.id].avgResidual },
      { name:'avg OOWP',             get:t=>data[t.id].avgOOWP },
      { name:'common opponents',     get:null },   // handled specially below
      { name:'total win%',           get:t=>data[t.id].winPct }
    ];

    let remaining = [...grp];
    const placed = [];
    let noteFor = {};

    for (const step of chain){
      if (remaining.length <= 1) break;
      if (step.name === 'common opponents'){
        // Compare each team's win% vs opponents common with the others in the tie.
        const vals = remaining.map(t => {
          const others = remaining.filter(o=>o.id!==t.id);
          const pcts = others.map(o => commonOpponentPct(t.id, o.id, games)).filter(v=>v!==null);
          return { t, v: pcts.length ? pcts.reduce((s,x)=>s+x,0)/pcts.length : null };
        });
        if (vals.some(x=>x.v === null)) continue;      // not usable
        const best = Math.max(...vals.map(x=>x.v));
        const winners = vals.filter(x=>Math.abs(x.v-best) < 1e-9);
        if (winners.length < remaining.length){
          winners.forEach(x => { noteFor[x.t.id]='common opponents'; placed.push(x.t); });
          remaining = remaining.filter(t => !winners.some(x=>x.t.id===t.id));
        }
        continue;
      }
      const vals = remaining.map(t => ({ t, v: step.get(t) }));
      const best = Math.max(...vals.map(x=>x.v));
      const winners = vals.filter(x => Math.abs(x.v-best) < 1e-9);
      if (winners.length < remaining.length){
        winners.forEach(x => { noteFor[x.t.id]=step.name; placed.push(x.t); });
        remaining = remaining.filter(t => !winners.some(x=>x.t.id===t.id));
      }
    }

    // 7. Coin toss for anyone still tied (admin-resolvable).
    remaining.forEach(t => { noteFor[t.id] = 'coin toss'; placed.push(t); });

    placed.forEach(t => ordered.push({ team:t, note: noteFor[t.id] || null }));
  });

  return ordered.map((o,i) => ({ ...o, rank:i+1, data:data[o.team.id] }));
}
/* ===========================================================================
   BRACKET  (per-group sizes, with first-round byes)

   Girls volleyball qualifies a different number of teams by group (24 / 20 / 16),
   and 24 and 20 are NOT powers of two — so those brackets can't be a clean
   1-vs-N pairing. The standard resolution is to give the TOP seeds a first-round
   bye until the field reduces to a power of two:

       fieldSize = 24  ->  next power of 2 down is 16  ->  8 first-round matches
                           need 16 teams playing, so 24-16 = 8 top seeds sit out
       fieldSize = 20  ->  4 first-round matches (8 teams play), 12 top seeds sit out
       fieldSize = 16  ->  no byes; standard 1v16 ... 8v9

   In general: byeCount = fieldSize - 2*(fieldSize - nextLowerPowerOfTwo)
   Simpler: teamsPlayingR1 = 2 * (fieldSize - P) where P = largest power of 2 <= fieldSize.
   The LOWEST seeds play the first round; the top `fieldSize - teamsPlayingR1` advance.

   If a section has FEWER eligible teams than its bracket size, the remaining
   slots become BYES (an empty slot is an automatic advance).

   NOTE: 2026 is the NJSIAA's first year with these expanded volleyball fields, so
   this is our best reading of the format and may need revising once the official
   brackets are published.
   =========================================================================== */
function largestPowerOfTwoAtMost(n){
  let p = 1;
  while (p*2 <= n) p *= 2;
  return p;
}

function buildBracket(sectionKeyStr, data, games){
  const [section, group] = sectionKeyStr.split('|');
  const fieldSize = bracketSizeFor(group);

  const pool = state.teams.filter(t =>
    t.section === section && t.group === group && !t.isOutOfState && data[t.id] && data[t.id].eligible);

  const ranked = rankTeams(pool, data, games).slice(0, fieldSize);

  // Seeds 1..fieldSize; any slot beyond the eligible pool is an empty (bye) slot.
  const seeds = [];
  for (let i=0;i<fieldSize;i++){
    seeds.push(ranked[i] ? { seed:i+1, entry:ranked[i] } : { seed:i+1, entry:null });
  }

  // How many teams actually play in round 1, and how many top seeds get a bye.
  const P = largestPowerOfTwoAtMost(fieldSize);
  const playingR1 = (fieldSize === P) ? fieldSize : 2 * (fieldSize - P);
  const byeCount  = fieldSize - playingR1;

  // The top `byeCount` seeds skip round 1.
  const byeSeeds = seeds.slice(0, byeCount);

  // The remaining seeds play, paired highest-vs-lowest within that band.
  const playSeeds = seeds.slice(byeCount);
  const round1 = [];
  for (let i=0;i<playSeeds.length/2;i++){
    round1.push({ high: playSeeds[i], low: playSeeds[playSeeds.length-1-i] });
  }

  return { seeds, round1, byeSeeds, byeCount, fieldSize, qualified: ranked.length };
}

function renderPredict(){
  const el = document.getElementById('tab-predict');
  const data = computeAll();
  const sections = getAllSections();
  const secOpts = [`<option value="all">All sections</option>`]
    .concat(sections.map(s=>`<option value="${s.key}" ${predictFilterSection===s.key?'selected':''}>${escapeHtml(s.label)}</option>`)).join('');

  const inSection = (g) => {
    if (predictFilterSection==='all') return true;
    const [sec,grp] = predictFilterSection.split('|');
    return [g.teamA,g.teamB].some(id => {
      const t = state.teams.find(x=>x.id===id);
      return t && t.section===sec && t.group===grp;
    });
  };

  const tbd = state.games
    .filter(g => g.scoreA===null || g.scoreA===undefined || g.scoreB===null || g.scoreB===undefined)
    .filter(inSection)
    .sort((a,b)=> a.date < b.date ? -1 : a.date > b.date ? 1 : 0);

  const rows = tbd.map(g => {
    const pick = predictions[g.id];
    const btn = (val,label) => `<button class="${pick===val?'':'ghost'}" style="padding:5px 10px; font-size:11.5px;"
      onclick="setPrediction('${g.id}','${val}')">${escapeHtml(label)}</button>`;
    return `<tr>
      <td class="num" style="white-space:nowrap;">${g.date}</td>
      <td class="team-name">${escapeHtml(teamName(g.teamA))}<div style="color:var(--chalk-dim); font-size:11px; margin:3px 0;">vs</div>${escapeHtml(teamName(g.teamB))}</td>
      <td class="center" style="display:flex; gap:6px; justify-content:center; flex-wrap:wrap; padding-top:14px;">
        ${btn(g.teamA, teamName(g.teamA)+' wins')}
        ${CONFIG.TIES_ALLOWED ? btn('TIE','Tie') : ''}
        ${btn(g.teamB, teamName(g.teamB)+' wins')}
      </td>
      <td class="center">${pick?`<button class="danger" style="padding:4px 8px; font-size:11px;" onclick="clearPrediction('${g.id}')">Clear</button>`:''}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="panel">
      <h2>Predict Upcoming Games</h2>
      <div class="form-row">
        <div class="field"><label>Section</label>
          <select onchange="predictFilterSection=this.value; renderPredict();">${secOpts}</select></div>
        <button class="ghost" onclick="randomizePredictions()">Randomize shown</button>
        <button class="ghost" onclick="clearAllPredictions()">Clear all</button>
      </div>
      <p class="hint">Pick a winner — or a tie — for any unplayed game. Your picks are private to you and only
        change what <em>you</em> see in the rankings and bracket. Once a real result is entered, your pick for
        that game stops mattering.</p>
      <div class="table-scroll">
        <table>
          <thead><tr><th>Date</th><th>Matchup</th><th class="center">Your pick</th><th></th></tr></thead>
          <tbody>${rows || `<tr><td colspan="4" class="empty">No unplayed games.</td></tr>`}</tbody>
        </table>
      </div>
    </div>`;
}

      <td class="num" style="white-space:nowrap;">${g.date}</td>
      <td class="team-name">${escapeHtml(teamName(g.oppId))}${g.isProjected?' <span class="tag oos">predicted</span>':''}</td>

    </tr>`;
  }).join('');

  const e = d.eligibility;
  el.innerHTML = `
    <div class="panel">
      <h2>${escapeHtml(t.name)}</h2>
      <p class="hint">
        ${t.isOutOfState ? 'Out-of-state' : escapeHtml(sectionLabel(t.section,t.group))} &middot;
        Record ${d.record.w}-${d.record.t}-${d.record.l} &middot;

    </div>`;
}

function teamName(id){ const t = state.teams.find(x=>x.id===id); return t ? t.name : '—'; }
/* ------------------------------- ACTIONS --------------------------------- */

async function addTeam(){
  if (!isAdmin) return;
  const name = document.getElementById('tName').value.trim();
  if (!name){ showToast('Name required.'); return; }
  const type = document.getElementById('tType').value;
  const secKey = document.getElementById('tSection').value;
  const [section, group] = secKey.split('|');

  let manualRecord = {w:0,t:0,l:0};
  if (type === 'oos'){
    const rec = document.getElementById('tRec').value.trim();
    const m = rec.match(/^(\d+)-(\d+)-(\d+)$/);
    if (!m){ showToast('Out-of-state teams need a record like 8-2-1 (w-t-l).'); return; }
    manualRecord = { w:+m[1], t:+m[2], l:+m[3] };
  }

  const team = {
    id: uid('t'), name,
    section: type==='oos' ? null : section,
    group:   type==='oos' ? null : group,
    ineligible:false,
    isOutOfState: type==='oos',
    njsiaaMember: type==='member',
    manualRecord
  };
  state.teams.push(team);
  renderAll();
  const { error } = await sb.from('teams').insert(localTeamToDb(team));
  if (error){ console.error(error); showToast('Could not save team.'); }
}

async function removeTeam(id){
  if (!isAdmin) return;
  const used = state.games.some(g => g.teamA===id || g.teamB===id);
  if (used){ showToast('Remove that team\'s games first.'); return; }
  state.teams = state.teams.filter(t=>t.id!==id);
  renderAll();
  await sb.from('teams').delete().eq('sport',SPORT).eq('id',id);
}

async function addGame(){
  if (!isAdmin) return;
  const date = document.getElementById('gDate').value;
  const a = document.getElementById('gA').value;
  const b = document.getElementById('gB').value;
  if (!date){ showToast('Date required.'); return; }
  if (a===b){ showToast('Teams must differ.'); return; }
  const saRaw = document.getElementById('gSA').value;
  const sbRaw = document.getElementById('gSB').value;
  const scoreA = saRaw==='' ? null : parseInt(saRaw,10);
  const scoreB = sbRaw==='' ? null : parseInt(sbRaw,10);
  if ((scoreA===null) !== (scoreB===null)){ showToast('Enter both scores or neither.'); return; }

  const game = { id: uid('g'), date, teamA:a, teamB:b, scoreA, scoreB };
  state.games.push(game);
  renderAll();
  const { error } = await sb.from('games').insert(localGameToDb(game));
  if (error){ console.error(error); showToast('Could not save game.'); }
}

async function removeGame(id){
  if (!isAdmin) return;
  state.games = state.games.filter(g=>g.id!==id);
  renderAll();
  await sb.from('games').delete().eq('sport',SPORT).eq('id',id);
}

/* ----------------------------- BULK TOOLS -------------------------------- */
async function bulkAddTeams(){
  if (!isAdmin) return;
  const lines = document.getElementById('bulkTeams').value.split('\n').map(l=>l.trim()).filter(Boolean);
  const added = [], errors = [];
  const validSections = new Set(getAllSections().map(s=>s.key));

  lines.forEach((line, i) => {
    const n = i+1;
    if (/^name\b/i.test(line)) return;                       // header row
    const f = (line.includes('\t') ? line.split('\t') : line.split(',')).map(x=>x.trim());
    if (f.length < 3){ errors.push(`Line ${n}: need "name, section, group"`); return; }
    const name = f[0];
    if (state.teams.some(t=>t.name.toLowerCase()===name.toLowerCase())){ errors.push(`Line ${n}: "${name}" already exists`); return; }

    // Out-of-state: "Name, OOS, 8-2-1"
    if (/^oos$/i.test(f[1])){
      const m = (f[2]||'').match(/^(\d+)-(\d+)-(\d+)$/);
      if (!m){ errors.push(`Line ${n}: out-of-state needs a record like 8-2-1`); return; }
      added.push({ id:uid('t'), name, section:null, group:null, ineligible:false,
                   isOutOfState:true, njsiaaMember:false, manualRecord:{w:+m[1],t:+m[2],l:+m[3]} });
      return;
    }
    const section = f[1], group = f[2];
    if (!validSections.has(sectionKey(section, group))){
      errors.push(`Line ${n}: "${section} / ${group}" isn't a valid section+group for ${SPORT_NAME}`); return;
    }
    added.push({ id:uid('t'), name, section, group, ineligible:false,
                 isOutOfState:false, njsiaaMember:true, manualRecord:{w:0,t:0,l:0} });
  });

  if (added.length){
    state.teams = state.teams.concat(added);
    const err = await writeInChunks('teams', added.map(localTeamToDb));
    if (err) errors.push('⚠ Database write failed: ' + err.message);
  }

  renderAll();
  const box = document.getElementById('bulkTeamsStatus');
  if (box){
    box.style.display='block';
    box.innerHTML = [`Added ${added.length} team(s).`]
      .concat(errors.length ? [`⚠ ${errors.length} problem line(s):`, ...errors] : []).join('<br>');
  }
  const ta = document.getElementById('bulkTeams');
  if (ta && !errors.length) ta.value = '';
}

async function bulkAddGames(){
  if (!isAdmin) return;
  const lines = document.getElementById('bulkGames').value.split('\n').map(l=>l.trim()).filter(Boolean);
  const byName = {};
  state.teams.forEach(t=>{ byName[t.name.toLowerCase()] = t; });

  const added = [], errors = [];
  lines.forEach((line, i) => {
    const n = i+1;
    if (/^date\b/i.test(line)) return;
    const f = (line.includes('\t') ? line.split('\t') : line.split(',')).map(x=>x.trim());
    if (f.length < 3){ errors.push(`Line ${n}: need "date, team A, team B"`); return; }
    const date = f[0];
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)){ errors.push(`Line ${n}: date must be YYYY-MM-DD`); return; }
    const ta = byName[(f[1]||'').toLowerCase()];
    const tb = byName[(f[2]||'').toLowerCase()];
    if (!ta){ errors.push(`Line ${n}: team "${f[1]}" not found`); return; }
    if (!tb){ errors.push(`Line ${n}: team "${f[2]}" not found`); return; }
    if (ta.id === tb.id){ errors.push(`Line ${n}: a team can't play itself`); return; }

    let scoreA = null, scoreB = null;
    if (f.length >= 5 && f[3] !== '' && f[4] !== ''){
      scoreA = parseInt(f[3],10); scoreB = parseInt(f[4],10);
      if (isNaN(scoreA) || isNaN(scoreB)){ errors.push(`Line ${n}: scores must be numbers`); return; }
    }
    if (state.games.some(g => g.date===date && (
        (g.teamA===ta.id && g.teamB===tb.id) || (g.teamA===tb.id && g.teamB===ta.id)))){
      errors.push(`Line ${n}: duplicate (same date + matchup) — skipped`); return;
    }
    added.push({ id:uid('g'), date, teamA:ta.id, teamB:tb.id, scoreA, scoreB });
  });

  if (added.length){
    state.games = state.games.concat(added);
    const err = await writeInChunks('games', added.map(localGameToDb));
    if (err) errors.push('⚠ Database write failed: ' + err.message);
  }

  renderAll();
  const box = document.getElementById('bulkGamesStatus');
  if (box){
    box.style.display='block';
    box.innerHTML = [`Added ${added.length} game(s).`]
      .concat(errors.length ? [`⚠ ${errors.length} problem line(s):`, ...errors] : []).join('<br>');
  }
  const ta2 = document.getElementById('bulkGames');
  if (ta2 && !errors.length) ta2.value = '';
}

/* ---------------------------- PREDICTIONS -------------------------------- */
async function setPrediction(gameId, val){
  predictions[gameId] = val;
  renderAll();
  if (!currentUser) return;
  const { error } = await sb.from('predictions').upsert({
    sport:SPORT, user_id:currentUser.id, game_id:gameId, winning_team_id:val });
  if (error){ console.error(error); showToast('Could not save your pick.'); }
}
async function clearPrediction(gameId){
  delete predictions[gameId];
  renderAll();
  if (!currentUser) return;
  await sb.from('predictions').delete()
    .eq('sport',SPORT).eq('user_id',currentUser.id).eq('game_id',gameId);
}
async function clearAllPredictions(){
  predictions = {};
  renderAll();
  if (!currentUser) return;
  await sb.from('predictions').delete().eq('sport',SPORT).eq('user_id',currentUser.id);
  showToast('All predictions cleared.');
}
async function randomizePredictions(){
  const inSection = (g) => {
    if (predictFilterSection==='all') return true;
    const [sec,grp] = predictFilterSection.split('|');
    return [g.teamA,g.teamB].some(id => {
      const t = state.teams.find(x=>x.id===id);
      return t && t.section===sec && t.group===grp;
    });
  };
  const tbd = state.games.filter(g =>
    (g.scoreA===null||g.scoreA===undefined||g.scoreB===null||g.scoreB===undefined) && inSection(g));
  const rows = [];
  tbd.forEach(g => {
    const pick = Math.random() < 0.5 ? g.teamA : g.teamB;   // ties left out of randomize
    predictions[g.id] = pick;
    if (currentUser) rows.push({ sport:SPORT, user_id:currentUser.id, game_id:g.id, winning_team_id:pick });
  });
  renderAll();
  if (rows.length) await writeInChunks('predictions', rows);
  showToast(`Randomized ${tbd.length} game(s).`);
}

/* ------------------------- ADMIN: SPORT SETTINGS ------------------------- */
async function saveSportSettings(){
  if (!isAdmin) return;
  const cutoff = document.getElementById('cfgCutoff').value;
  const bestN  = parseInt(document.getElementById('cfgBestN').value, 10);
  const firstN = parseInt(document.getElementById('cfgFirstN').value, 10);
  const minG   = parseInt(document.getElementById('cfgMinGames').value, 10);
  const ties   = document.getElementById('cfgTies').value === 'yes';

  const problems = [];
  if (!cutoff) problems.push('Cutoff date is required.');
  if (!(bestN  > 0)) problems.push('Best N must be a positive number.');
  if (!(firstN > 0)) problems.push('First N must be a positive number.');
  if (!(minG   > 0)) problems.push('Minimum games must be a positive number.');
  if (problems.length){
    const box = document.getElementById('cfgStatus');
    box.style.display='block';
    box.innerHTML = '⚠ ' + problems.join('<br>⚠ ');
    return;
  }

  CONFIG.BEST_N = bestN; CONFIG.FIRST_N = firstN; CONFIG.MIN_GAMES = minG;
  CONFIG.TIES_ALLOWED = ties; CONFIG.CUTOFF_DATE = cutoff;

  const { error } = await sb.from('sports').update({
    best_n:bestN, first_n:firstN, min_games:minG, ties_allowed:ties, cutoff_date:cutoff
  }).eq('sport', SPORT);

  renderAll();   // rebuilds every panel with the new numbers
  const box = document.getElementById('cfgStatus');   // re-fetch: renderAll replaced it
  if (box){
    box.style.display = 'block';
    box.innerHTML = error
      ? '⚠ Could not save: ' + escapeHtml(error.message)
      : `Saved. Cutoff ${escapeHtml(cutoff)}, best ${bestN}, first ${firstN}, minimum ${minG}, ties ${ties?'allowed':'not allowed'}. All rankings recalculated.`;
  }
  if (!error) showToast('Sport settings saved.');
}

/* ------------------------- ADMIN: MESSAGE / MAINT ------------------------ */
async function saveSiteMessage(){
  if (!isAdmin) return;
  const v = document.getElementById('msgInput').value;
  siteMessage = v;
  renderAll();
  const { error } = await sb.from('site_message')
    .update({ message:v, updated_at:new Date().toISOString() }).eq('sport',SPORT);
  if (error){ console.error(error); showToast('Could not save.'); }
  else showToast('Banner saved.');
}
async function clearSiteMessage(){
  if (!isAdmin) return;
  siteMessage = '';
  renderAll();
  await sb.from('site_message').update({ message:'', updated_at:new Date().toISOString() }).eq('sport',SPORT);
  showToast('Banner cleared.');
}
async function setMaintenance(on){
  if (!isAdmin) return;
  const input = document.getElementById('maintInput');
  if (input) maintenanceMessage = input.value;
  maintenanceOn = on;
  renderAll();
  const { error } = await sb.from('site_message')
    .update({ maintenance_on:on, maintenance_message:maintenanceMessage, updated_at:new Date().toISOString() })
    .eq('sport',SPORT);
  if (error){ console.error(error); showToast('Could not update maintenance mode.'); }
  else showToast(on ? 'Maintenance ON — visitors see the lock screen.' : 'Maintenance OFF — site is live.');
}

/* -------------------------------- TABS ----------------------------------- */
function switchTab(name){
  activeTab = name;
  document.querySelectorAll('.tab').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tabview').forEach(v => v.style.display = 'none');
  document.getElementById('tab-'+name).style.display = 'block';
}

/* --------------------------------- INIT ---------------------------------- */
async function init(){
  document.querySelectorAll('.tab').forEach(b =>
    b.addEventListener('click', () => switchTab(b.dataset.tab)));
  await initAuth();
  await loadAllData();
  renderAll();
  switchTab('rankings');
}
init();
</script>
